<html>
   <head>
    <title> Form </title>
	<link rel="stylesheet" style ="Text/css" href="sumfor.css">
	 <script src="sumfor.js"></script>
   </head>
<body>
   <div class="container" role="region" aria-labelledby="title">
    <h1 id="title"> Form Pendaftaran</h1>
	<form action="#" method="post" novalidate>
	<div class="f1-container">
	  <label style="color: white;" for="name">Nama :</label>
	  <input id="name" name="name" type="text" placeholder="Fill" required>
	  
      <label style="color: white;" for="kelas">Kelas:</label>
	  <input id="kelas" name="kelas" type="kelas" placeholder="Fill" required>
	  
     <label style="color: white;" for="Umur">Umur: </label>
	  <label style="color: white;" for="10-12 tahun">10-12 tahun </label>
	  <input type="Checkbox" id="10-12 tahun" name="myoptions1" value="option1">
    <label style="color: white;" for="13-15 tahun">13-15 tahun </label>
	<input type="Checkbox" id="13-15 tahun" name="myoptions1" value="option1"><br>
	  <label style="color: white;" for="16-17 tahun">16-17 tahun </label>
	<input type="Checkbox" id="16-17 tahun" name="myoptions1" value="option1"><br>
	
	 <label style="color: white;" for="Jenis Kelamin">Jenis Kelamin </label><br>
	  <label style="color: white;" for="Laki-laki">Laki-laki </label></br>
	  <input type="radio" id="Laki-laki" name="myoptions1" value="option1">
    <label style="color: white;" for="Perempuan">Perempuan </label>
	<input type="radio" id="Perempuan" name="myoptions1" value="option1"><br>
	
	 <label style="color: white;" for="Tingkat">Tingkat: </label>
	  <label style="color: white;" for="SD">SD </label>
	  <input type="Radio" id="SD" name="myoptions1" value="option1">
    <label style="color: white;" for="SMP">SMP </label>
	<input type="radio" id="SMP" name="myoptions1" value="option1"><br>
	  <label style="color: white;"  for="SMA">SMA </label>
	<input type="Radio" id="SMA" name="myoptions1" value="option1"><br>
	
	  <button type="clear">clear</button>  <button type="ok">ok</button>
    </form>
	</div>
   </div>
</body>
</html>
</html>
